name: Add Google Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-verification:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add Google Search Console verification meta tag
        run: |
          python3 <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          verification_tag = '    <meta name="google-site-verification" content="jlN2r12AuPY2e-OqyBraBqZacE5B62jy_RXWu-LT3Sc">'
          viewport_tag = '    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n'

          html = index_path.read_text(encoding='utf-8')

          if 'name="google-site-verification"' not in html:
              if viewport_tag in html:
                  html = html.replace(viewport_tag, viewport_tag + verification_tag + '\n', 1)
              else:
                  html = html.replace('<head>\n', '<head>\n' + verification_tag + '\n', 1)
              index_path.write_text(html, encoding='utf-8')

          for cleanup_path in [Path('.github/workflows/add-google-verification.yml'), Path('.github/verification-trigger.txt')]:
              if cleanup_path.exists():
                  cleanup_path.unlink()
          PY

      - name: Commit verification update
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-google-verification.yml .github/verification-trigger.txt
          git commit -m "Add Google Search Console verification meta tag"
          git push
