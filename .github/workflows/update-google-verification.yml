name: Update Google Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-verification:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace Google Search Console verification meta tag
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          new_tag = '    <meta name="google-site-verification" content="61euVhxVKsQb7E0ZNCUaTPjNgZZqJX85InSe1NOJZzU" />'
          viewport_tag = '    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n'

          html = index_path.read_text(encoding='utf-8')
          html = re.sub(r'\s*<meta\s+name=["\']google-site-verification["\']\s+content=["\'][^"\']*["\']\s*/?>\s*', '\n' + new_tag + '\n', html)

          if 'name="google-site-verification"' not in html and "name='google-site-verification'" not in html:
              if viewport_tag in html:
                  html = html.replace(viewport_tag, viewport_tag + new_tag + '\n', 1)
              else:
                  html = html.replace('<head>\n', '<head>\n' + new_tag + '\n', 1)

          index_path.write_text(html, encoding='utf-8')

          for cleanup_path in [Path('.github/workflows/update-google-verification.yml'), Path('.github/verification-trigger-2.txt')]:
              if cleanup_path.exists():
                  cleanup_path.unlink()
          PY

      - name: Commit verification replacement
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-google-verification.yml .github/verification-trigger-2.txt
          git commit -m "Update Google Search Console verification meta tag"
          git push
